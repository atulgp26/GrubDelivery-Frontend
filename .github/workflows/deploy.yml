name: Auto Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_rsa << 'KEYEOF'
${{ secrets.SSH_PRIVATE_KEY }}
KEYEOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa -H 13.127.79.155 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via Docker
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@13.127.79.155 << 'DEPLOY_EOF'
            set -e
            cd ~/grubFood-frontend

            git pull origin master

            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
          DEPLOY_EOF

      - name: Health check
        run: |
          sleep 20
          curl -sf http://13.127.79.155 || echo "Health check failed, check container logs"

      - name: Notify
        if: always()
        run: |
          echo "Deployment ${{ job.status }}"
